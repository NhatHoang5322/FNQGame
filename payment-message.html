<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="FNQ Studio - Payment confirmation message">
    <title>FNQ - Payment Message</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #0f0c1a 0%, #0c0a14 100%);
            font-family: 'Press Start 2P', cursive;
            padding: 20px;
        }
        
        .container {
            text-align: center;
        }
        
        h1 {
            color: #22d3ee;
            font-size: clamp(1rem, 5vw, 2rem);
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(34, 211, 238, 0.5);
            line-height: 1.6;
        }
        
        p {
            color: #d7d3e7;
            font-size: clamp(0.6rem, 3vw, 1rem);
            margin-top: 20px;
            letter-spacing: 1px;
        }

        a {
            display: inline-block;
            margin-top: 40px;
            padding: 12px 28px;
            background: #7c3aed;
            color: #f5f4fb;
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        a:hover {
            background: #6d28d9;
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Giàu thế, nhưng bạn hãy chờ game sẽ được xuất bản sớm thôi</h1>
        <p>FNQ Studio</p>
        <a href="index.html">← Quay lại trang chủ</a>
    </div>
</body>
</html>
